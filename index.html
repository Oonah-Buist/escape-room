<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Escape Room View</title>
  <link rel="preload" as="image" href="Assets/FrontWall.webp">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="experience">
    <div class="scene" aria-label="3D room view">
      <div class="room" id="room">
        <figure class="wall wall-front">
          <img
            src="Assets/FrontWall.webp"
            srcset="Assets/FrontWall-mobile.webp 720w, Assets/FrontWall.webp 1000w"
            sizes="100vw"
            loading="eager"
            fetchpriority="high"
            decoding="async"
            alt="Front wall"
          >
          <button class="hotspot-switch" type="button" aria-label="Open light switch document"></button>
          <button class="hotspot-book" type="button" aria-label="Open book document"></button>
          <button class="hotspot-bottle" type="button" aria-label="Open bottle document"></button>
          <button
            class="hotspot-door"
            type="button"
            aria-label="Try to open the door"
          ></button>
          <a
            class="hotspot-donate"
            href="https://childhoodcancerresearchtrust.org/product/donation/?"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="Donate to Childhood Cancer Research Trust"
          ></a>
          <div class="speech-bubble door-bubble" id="doorBubble" role="status" aria-live="polite">
            With £50,000 we can pass through this door.
          </div>
        </figure>
        <figure class="wall wall-left">
          <img
            src="Assets/LeftWall.webp"
            srcset="Assets/LeftWall-mobile.webp 720w, Assets/LeftWall.webp 1000w"
            sizes="100vw"
            alt="Left wall"
          >
          <button class="hotspot-window" type="button" aria-label="Open window document"></button>
          <button class="hotspot-word" type="button" aria-label="Atherosclerosis" style="--x: 6.7%; --y: 1.8%; --w: 41.3%; --h: 7.6%;"></button>
          <button class="hotspot-word" type="button" aria-label="NAFLD" style="--x: 50.5%; --y: 1.8%; --w: 23.7%; --h: 7.6%;"></button>
          <button class="hotspot-word" type="button" aria-label="Rheumatoid Arthritis" style="--x: 17.3%; --y: 10.5%; --w: 36.2%; --h: 9.2%;"></button>
          <button class="hotspot-word" type="button" aria-label="IBD" style="--x: 57.2%; --y: 10.5%; --w: 20.4%; --h: 9.2%;"></button>
          <button class="hotspot-word" type="button" aria-label="Hypertension" style="--x: 7.6%; --y: 20.8%; --w: 35.6%; --h: 7.7%;"></button>
          <button class="hotspot-word" type="button" aria-label="Obesity" style="--x: 46.6%; --y: 20.8%; --w: 21.4%; --h: 7.7%;"></button>
          <button class="hotspot-word" type="button" aria-label="Psoriasis" style="--x: 27.1%; --y: 30.0%; --w: 22.9%; --h: 8.0%;"></button>
          <button class="hotspot-word" type="button" aria-label="Cancer" style="--x: 54.4%; --y: 30.0%; --w: 20.3%; --h: 8.0%;"></button>
          <button class="hotspot-word" type="button" aria-label="Alzheimer's" style="--x: 3.8%; --y: 43.9%; --w: 30.4%; --h: 7.7%;"></button>
          <button class="hotspot-word" type="button" aria-label="Parkinson's" style="--x: 69%; --y: 43.9%; --w: 27.8%; --h: 7.7%;"></button>
          <button class="hotspot-word" type="button" aria-label="Multiple Sclerosis" style="--x: 2.4%; --y: 50.1%; --w: 30.6%; --h: 12.8%;"></button>
          <button class="hotspot-word" type="button" aria-label="Metabolic Syndrome" style="--x: 68.9%; --y: 50.8%; --w: 28.1%; --h: 11.6%;"></button>
          <button class="hotspot-word" type="button" aria-label="Type 2 Diabetes" style="--x: 7.6%; --y: 70.5%; --w: 26.4%; --h: 12.3%;"></button>
          <button class="hotspot-word" type="button" aria-label="Cardiac Hypertrophy" style="--x: 69%; --y: 70.5%; --w: 30.2%; --h: 12.2%;"></button>
          <div class="speech-bubble left-bubble" id="leftWallBubble" role="status" aria-live="polite">
            This condition has<br>PPARy involvement
          </div>
        </figure>
        <figure class="wall wall-right">
          <img
            src="Assets/RightWall.webp"
            srcset="Assets/RightWall-mobile.webp 720w, Assets/RightWall.webp 1000w"
            sizes="100vw"
            alt="Right wall"
          >
          <button class="hotspot-curtain" type="button" aria-label="Open curtain document"></button>
          <button class="hotspot-cancer" type="button" aria-label="Medulloblastoma" style="--x: 18%; --y: 2.2%; --w: 48%; --h: 6.6%;"></button>
          <button class="hotspot-cancer" type="button" aria-label="Ewing Sarcoma" style="--x: 4.5%; --y: 12.6%; --w: 18.5%; --h: 7.7%;"></button>
          <button class="hotspot-cancer" type="button" aria-label="Liposarcoma" style="--x: 28.5%; --y: 12.6%; --w: 32.5%; --h: 7.7%;"></button>
          <button class="hotspot-cancer" type="button" aria-label="Liver Cancer" style="--x: 22%; --y: 21.7%; --w: 20.5%; --h: 8.1%;"></button>
          <button class="hotspot-cancer" type="button" aria-label="Lymphomas" style="--x: 42%; --y: 21.7%; --w: 23.5%; --h: 8.1%;"></button>
          <button class="hotspot-cancer" type="button" aria-label="Bladder Cancer" style="--x: 23.5%; --y: 30.4%; --w: 20.5%; --h: 8.3%;"></button>
          <button class="hotspot-cancer" type="button" aria-label="Lung Cancer" style="--x: 47%; --y: 30.4%; --w: 17.5%; --h: 8.3%;"></button>
          <button class="hotspot-cancer" type="button" aria-label="Prostate Cancer" style="--x: 23.5%; --y: 39.8%; --w: 22%; --h: 8.2%;"></button>
          <button class="hotspot-cancer" type="button" aria-label="Gliomas" style="--x: 49%; --y: 39.8%; --w: 15.5%; --h: 8.2%;"></button>
          <button class="hotspot-cancer" type="button" aria-label="Breast Cancer" style="--x: 18%; --y: 49.5%; --w: 21%; --h: 7.8%;"></button>
          <button class="hotspot-cancer" type="button" aria-label="Neuroblastoma" style="--x: 41%; --y: 49.5%; --w: 33%; --h: 7.8%;"></button>
          <button class="hotspot-cancer" type="button" aria-label="Kidney Cancer" style="--x: 23.5%; --y: 58.8%; --w: 18.5%; --h: 7.8%;"></button>
          <button class="hotspot-cancer" type="button" aria-label="Glioblastoma" style="--x: 47%; --y: 58.8%; --w: 26%; --h: 7.8%;"></button>
          <button class="hotspot-cancer" type="button" aria-label="Leukemia (ALL)" style="--x: 4%; --y: 68%; --w: 19%; --h: 9%;"></button>
          <button class="hotspot-cancer" type="button" aria-label="Leukemia (AML)" style="--x: 26%; --y: 68%; --w: 19%; --h: 9%;"></button>
          <button class="hotspot-cancer" type="button" aria-label="Pancreatic Cancer" style="--x: 49%; --y: 68%; --w: 25%; --h: 9%;"></button>
          <button class="hotspot-cancer" type="button" aria-label="GI Cancer" style="--x: 17%; --y: 78.4%; --w: 19.5%; --h: 6.6%;"></button>
          <button class="hotspot-cancer" type="button" aria-label="Osteosarcoma" style="--x: 40%; --y: 78.4%; --w: 29%; --h: 6.6%;"></button>
          <button class="hotspot-cancer" type="button" aria-label="Rhabdomyosarcoma" style="--x: 21%; --y: 87.4%; --w: 48%; --h: 6.7%;"></button>
          <button class="hotspot-cancer" type="button" aria-label="Colorectal or Colon Cancer" style="--x: 7%; --y: 93.2%; --w: 70%; --h: 6.8%;"></button>
          <div class="speech-bubble right-bubble" id="rightWallBubble" role="status" aria-live="polite">
            This cancer<br>has PPARy involvement
          </div>
        </figure>
        <figure class="wall wall-back">
          <img
            src="Assets/Wall.webp"
            srcset="Assets/Wall-mobile.webp 720w, Assets/Wall.webp 1000w"
            sizes="100vw"
            alt="Back wall"
          >
        </figure>
      </div>
      <div class="sunlight-overlay" aria-hidden="true">
        <div class="sunlight-ray sunlight-ray-main"></div>
        <div class="sunlight-ray sunlight-ray-soft"></div>
      </div>
      <div class="entry-cinematic" aria-hidden="true"></div>
      <nav class="arrow-controls" aria-label="Turn room view">
        <button class="arrow arrow-left" data-turn="left" aria-label="Turn left"></button>
        <button class="arrow arrow-right" data-turn="right" aria-label="Turn right"></button>
      </nav>
      <div class="sound-controls" aria-label="Sound controls">
        <button
          id="soundToggle"
          class="sound-toggle"
          type="button"
          aria-label="Turn sound off"
          aria-pressed="false"
          title="Sound on"
        >
          <svg class="sound-toggle-icon icon-on" viewBox="0 0 24 24" aria-hidden="true">
            <rect x="9" y="3" width="6" height="10" rx="3"></rect>
            <path d="M6 10a6 6 0 0 0 12 0"></path>
            <line x1="12" y1="16" x2="12" y2="21"></line>
            <line x1="8" y1="21" x2="16" y2="21"></line>
          </svg>
          <svg class="sound-toggle-icon icon-off" viewBox="0 0 24 24" aria-hidden="true">
            <rect x="9" y="3" width="6" height="10" rx="3"></rect>
            <path d="M6 10a6 6 0 0 0 12 0"></path>
            <line x1="12" y1="16" x2="12" y2="21"></line>
            <line x1="8" y1="21" x2="16" y2="21"></line>
            <line x1="4" y1="4" x2="20" y2="20"></line>
          </svg>
        </button>
        <label class="sound-volume-wrap" for="soundVolume">
          <span class="sound-volume-label">Vol</span>
          <input
            id="soundVolume"
            class="sound-volume"
            type="range"
            min="0"
            max="100"
            step="1"
            value="70"
            aria-label="Sound volume"
          >
        </label>
      </div>
    </div>
  </main>
      <div class="window-modal" id="windowModal" aria-hidden="true">
    <div class="window-modal-panel" role="dialog" aria-modal="true" aria-label="Window document">
      <div class="modal-header">
        <button class="modal-close" type="button" aria-label="Close window document">x</button>
      </div>
      <div class="modal-content">
        <img
          class="modal-doc-image"
          src="Assets/Window.png"
          srcset="Assets/Window-mobile.webp 820w, Assets/Window.png 1376w"
          sizes="(max-width: 900px) 94vw, 82vw"
          alt="Window document"
          loading="lazy"
          decoding="async"
        >
      </div>
      <div class="modal-actions">
        <button class="modal-action" type="button" data-action="save" data-pdf="Assets/Window.pdf">Save</button>
        <button class="modal-action" type="button" data-action="print" data-pdf="Assets/Window.pdf">Print</button>
      </div>
    </div>
  </div>
  <div class="window-modal" id="curtainModal" aria-hidden="true">
    <div class="window-modal-panel" role="dialog" aria-modal="true" aria-label="Curtain document">
      <div class="modal-header">
        <button class="modal-close" type="button" aria-label="Close curtain document">x</button>
      </div>
      <div class="modal-content">
        <img
          class="modal-doc-image"
          src="Assets/Curtain.png"
          srcset="Assets/Curtain-mobile.webp 820w, Assets/Curtain.png 1376w"
          sizes="(max-width: 900px) 94vw, 82vw"
          alt="Curtain document"
          loading="lazy"
          decoding="async"
        >
      </div>
      <div class="modal-actions">
        <button class="modal-action" type="button" data-action="save" data-pdf="Assets/Curtain.pdf">Save</button>
        <button class="modal-action" type="button" data-action="print" data-pdf="Assets/Curtain.pdf">Print</button>
      </div>
    </div>
  </div>
  <div class="window-modal" id="switchModal" aria-hidden="true">
    <div class="window-modal-panel" role="dialog" aria-modal="true" aria-label="Light switch document">
      <div class="modal-header">
        <button class="modal-close" type="button" aria-label="Close light switch document">x</button>
      </div>
      <div class="modal-content">
        <img
          class="modal-doc-image"
          src="Assets/Light%20switch.png"
          srcset="Assets/Light%20switch-mobile.webp 820w, Assets/Light%20switch.png 1376w"
          sizes="(max-width: 900px) 94vw, 82vw"
          alt="Light switch document"
          loading="lazy"
          decoding="async"
        >
      </div>
      <div class="modal-actions">
        <button class="modal-action" type="button" data-action="save" data-pdf="Assets/Light%20switch.pdf">Save</button>
        <button class="modal-action" type="button" data-action="print" data-pdf="Assets/Light%20switch.pdf">Print</button>
      </div>
    </div>
  </div>
  <div class="window-modal" id="bookModal" aria-hidden="true">
    <div class="window-modal-panel" role="dialog" aria-modal="true" aria-label="Book document">
      <div class="modal-header">
        <button class="modal-close" type="button" aria-label="Close book document">x</button>
      </div>
      <div class="modal-content">
        <img
          class="modal-doc-image"
          src="Assets/Book.png"
          srcset="Assets/Book-mobile.webp 820w, Assets/Book.png 1376w"
          sizes="(max-width: 900px) 94vw, 82vw"
          alt="Book document"
          loading="lazy"
          decoding="async"
        >
      </div>
      <div class="modal-actions">
        <button class="modal-action" type="button" data-action="save" data-pdf="Assets/Book.pdf">Save</button>
        <button class="modal-action" type="button" data-action="print" data-pdf="Assets/Book.pdf">Print</button>
      </div>
    </div>
  </div>
  <div class="window-modal" id="bottleModal" aria-hidden="true">
    <div class="window-modal-panel" role="dialog" aria-modal="true" aria-label="Bottle document">
      <div class="modal-header">
        <button class="modal-close" type="button" aria-label="Close bottle document">x</button>
      </div>
      <div class="modal-content">
        <img
          class="modal-doc-image"
          src="Assets/Bottle.png"
          srcset="Assets/Bottle-mobile.webp 820w, Assets/Bottle.png 1376w"
          sizes="(max-width: 900px) 94vw, 82vw"
          alt="Bottle document"
          loading="lazy"
          decoding="async"
        >
      </div>
      <div class="modal-actions">
        <button class="modal-action" type="button" data-action="save" data-pdf="Assets/Bottle.pdf">Save</button>
        <button class="modal-action" type="button" data-action="print" data-pdf="Assets/Bottle.pdf">Print</button>
      </div>
    </div>
  </div>
  <div class="mobile-popup" id="mobilePopup" aria-hidden="true">
    <div class="mobile-popup-card" role="dialog" aria-modal="true" aria-labelledby="mobilePopupTitle">
      <button class="mobile-popup-close" id="mobilePopupClose" type="button" aria-label="Close popup">x</button>
      <h2 class="mobile-popup-title" id="mobilePopupTitle"></h2>
      <p class="mobile-popup-message" id="mobilePopupMessage"></p>
      <div class="mobile-popup-actions">
        <a class="mobile-popup-action mobile-open-pdf" id="mobileOpenPdf" href="#" target="_blank" rel="noopener noreferrer">Open PDF</a>
        <button class="mobile-popup-action mobile-return" id="mobilePopupReturn" type="button">Return to room</button>
      </div>
    </div>
  </div>
  <audio
    id="bgMusic"
    src="Assets/Dvorak - Songs My Mother Taught Me.mp3"
    preload="none"
    loop
    aria-hidden="true"
  ></audio>
  <script src="script.js"></script>
</body>
</html>
